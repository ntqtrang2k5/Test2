{% extends 'base.html' %}
{% load static %}

{% block title %}Thêm Xe Mới - CAR RENT{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/QuanLyXe.css' %}">
{% endblock %}

{% block content %}
<div class="view-section active">
    <div class="car-preview-container">
        <div class="form-page-card" style="background-color: #ffffff; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); border: 1px solid #f3f4f6;">
            <div class="form-page-header">
                <h3 class="section-title">
                    <a href="{% url 'cars:list' %}" class="back-icon-link" style="color: inherit; text-decoration: none; margin-right: 15px;">
                        <i class="fa-solid fa-arrow-left"></i>
                    </a>
                    {% if is_edit %}CẬP NHẬT THÔNG TIN XE{% else %}THÊM XE MỚI{% endif %}
                </h3>
            </div>

            <form id="add-car-form" class="standard-form">
                {% csrf_token %}
                <input type="hidden" id="is-edit" name="is_edit" value="{{ is_edit|yesno:'true,false' }}">
                <input type="hidden" id="original-bien-so" name="original_bien_so" value="{{ car.bien_so }}">
                
                <style>
                    .required-dot { color: #ef4444; margin-left: 2px; font-weight: bold; }
                    .readonly-field { background-color: #f9fafb !important; border: 1px solid #e5e7eb !important; color: #6b7280 !important; cursor: not-allowed !important; }
                </style>

                <div class="form-grid grid-3">
                    <div class="form-group">
                        <label for="add-car-brand">Hãng Xe <span class="required-dot">*</span></label>
                        <select id="add-car-brand" name="brand" required>
                            <option value="">-- Chọn Hãng Xe --</option>
                            {% for hx in hang_xe_list %}
                            <option value="{{ hx.ma_hang }}" {% if car.loai_xe.hang_xe.ma_hang == hx.ma_hang %}selected{% endif %}>{{ hx.ten_hang }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="add-car-name">Loại Xe <span class="required-dot">*</span></label>
                        <select id="add-car-name" name="loai_xe" required>
                            <option value="">-- Chọn Loại Xe --</option>
                            {% for lx in loai_xe_list %}
                            <option value="{{ lx.ma_loai }}" data-brand="{{ lx.hang_xe.ma_hang }}" data-style="{{ lx.kieu_xe.ma_kieu }}" data-seats="{{ lx.so_cho_ngoi }}" {% if car.loai_xe.ma_loai == lx.ma_loai %}selected{% endif %}>{{ lx.ten_loai }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="add-car-plate">Biển Số Xe <span class="required-dot">*</span></label>
                        <input type="text" id="add-car-plate" name="bien_so" class="input-plate-highlight" placeholder="VD: 51H-123.45" value="{{ car.bien_so }}" required {% if is_edit %}readonly class="readonly-field"{% endif %}>
                    </div>

                    <div class="form-group">
                        <label for="add-car-year">Năm Sản Xuất <span class="required-dot">*</span></label>
                        <input type="number" id="add-car-year" name="nam_san_xuat" placeholder="2022" value="{{ car.nam_san_xuat }}" required>
                    </div>

                    <div class="form-group">
                        <label for="add-car-color">Màu Xe <span class="required-dot">*</span></label>
                        <select id="add-car-color" name="mau_sac" required>
                            <option value="">-- Chọn Màu --</option>
                            {% for ms in mau_sac_list %}
                            <option value="{{ ms.ma_mau }}" {% if car.mau_sac.ma_mau == ms.ma_mau %}selected{% endif %}>{{ ms.ten_mau }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="add-car-seats">Số Chỗ (Tự động)</label>
                        <input type="number" id="add-car-seats" class="readonly-field" readonly value="{% if car %}{{ car.loai_xe.so_cho_ngoi }}{% endif %}">
                    </div>

                    <div class="form-group">
                        <label for="add-car-type">Kiểu Dáng <span class="required-dot">*</span></label>
                        <select id="add-car-type" name="kieu_xe" required>
                            <option value="">-- Chọn Kiểu Dáng --</option>
                            {% for kx in kieu_xe_list %}
                            <option value="{{ kx.ma_kieu }}" {% if car.kieu_xe.ma_kieu == kx.ma_kieu %}selected{% endif %}>{{ kx.ten_kieu }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="add-car-country">Xuất Xứ (Từ Hãng)</label>
                        <input type="text" id="add-car-country" class="readonly-field" readonly value="{% if car %}{{ car.loai_xe.hang_xe.quoc_gia.ten_quoc_gia }}{% endif %}">
                    </div>
                    
                    <div class="form-group">
                        <label for="add-car-price-day">Giá thuê ngày (VNĐ) <span class="required-dot">*</span></label>
                        <input type="text" id="add-car-price-day" name="gia_thue_ngay" class="input-price-highlight" placeholder="800,000" value="{{ car.gia_thue_ngay }}" required>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label for="add-car-status">Trạng Thái Hoạt Động</label>
                    <select id="add-car-status" name="trang_thai">
                        <option value="Sẵn sàng" {% if car.trang_thai == 'Sẵn sàng' %}selected{% endif %}>Sẵn sàng</option>
                        <option value="Đang thuê" {% if car.trang_thai == 'Đang thuê' %}selected{% endif %}>Đang sử dụng (Đang thuê)</option>
                        <option value="Bảo trì" {% if car.trang_thai == 'Bảo trì' %}selected{% endif %}>Đang bảo trì</option>
                    </select>
                </div>

                <div class="form-actions-bar">
                    <button type="button" class="btn-secondary" onclick="window.location.href='{% url 'cars:list' %}'">Hủy bỏ</button>
                    <button type="submit" class="btn-primary" id="btn-save"><i class="fa-solid fa-floppy-disk"></i> Lưu phương tiện</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const SAVE_URL = "{% url 'cars:save' %}";
    
    document.addEventListener('DOMContentLoaded', function() {
        const brandSelect = document.getElementById('add-car-brand');
        const modelSelect = document.getElementById('add-car-name');
        const typeInput = document.getElementById('add-car-type');
        const seatsInput = document.getElementById('add-car-seats');
        const countryInput = document.getElementById('add-car-country');
        const form = document.getElementById('add-car-form');

        const G_COUNTRIES_BY_BRAND = {
            {% for hx in hang_xe_list %}"{{ hx.ma_hang }}": "{{ hx.quoc_gia.ten_quoc_gia }}",{% endfor %}
        };

        function toggleOtherFields(isEnabled) {
            const excludeIds = ['add-car-brand', 'add-car-seats', 'add-car-country'];
            const elements = form.querySelectorAll('input, select, button[type="submit"]');
            elements.forEach(el => {
                if (el.type === 'hidden' || excludeIds.includes(el.id)) return;
                
                const isEdit = document.getElementById('is-edit').value === 'true';
                if (isEdit && el.id === 'add-car-plate') return;

                el.disabled = !isEnabled;
                if (!isEnabled) {
                    el.style.opacity = '0.5';
                    el.style.cursor = 'not-allowed';
                } else {
                    el.style.opacity = '';
                    el.style.cursor = '';
                }
            });
        }

        // Cascade logic for Brand -> Model
        function updateModelOptions() {
            const selectedBrand = brandSelect.value;
            countryInput.value = G_COUNTRIES_BY_BRAND[selectedBrand] || '';
            
            const hasBrand = (selectedBrand !== "");
            toggleOtherFields(hasBrand);

            let firstVisible = null;
            
            Array.from(modelSelect.options).forEach(opt => {
                if (opt.value === "") return;
                if (selectedBrand === "" || opt.getAttribute('data-brand') === selectedBrand) {
                    opt.style.display = '';
                    if (!firstVisible) firstVisible = opt;
                } else {
                    opt.style.display = 'none';
                    if (opt.selected) opt.selected = false;
                }
            });

            updateReadonlyFields();
        }

        // Update readonly fields (Seats) based on Model selection
        function updateReadonlyFields() {
            const selectedOption = modelSelect.options[modelSelect.selectedIndex];
            if (selectedOption && selectedOption.value !== "") {
                seatsInput.value = selectedOption.getAttribute('data-seats');
            } else {
                seatsInput.value = '';
            }
        }

        // Dummy helper since we have the style ID
        const G_STYLES = [
            {% for kx in kieu_xe_list %}{id: "{{ kx.ma_kieu }}", name: "{{ kx.ten_kieu }}"},{% endfor %}
        ];
        function getStyleNameById(id) {
            const st = G_STYLES.find(s => s.id === id);
            return st ? st.name : "";
        }

        brandSelect.addEventListener('change', updateModelOptions);
        modelSelect.addEventListener('change', updateReadonlyFields);

        // Khởi tạo trạng thái ban đầu của form
        updateModelOptions();

        // Price Formatting JS
        const priceInput = document.getElementById('add-car-price-day');
        if (priceInput) {
            priceInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\./g, '').replace(/,/g, '').replace(/[^\d]/g, '');
                if (value) {
                    e.target.value = new Intl.NumberFormat('vi-VN').format(value);
                } else {
                    e.target.value = '';
                }
            });
        }

        // Form Submission via AJAX
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            const btnSave = document.getElementById('btn-save');
            btnSave.textContent = 'Đang lưu...';
            btnSave.disabled = true;

            fetch(SAVE_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': data.csrfmiddlewaretoken
                },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(res => {
                if(res.success) {
                    alert("Lưu thông tin xe thành công!");
                    window.location.href = "{% url 'cars:list' %}";
                } else {
                    alert(res.error || "Lưu thất bại!");
                    btnSave.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Lưu phương tiện';
                    btnSave.disabled = false;
                }
            })
            .catch(err => {
                alert("Lỗi kết nối mạng!");
                btnSave.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Lưu phương tiện';
                btnSave.disabled = false;
            });
        });
    });
</script>
{% endblock %}
