{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - CAR RENT SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #008060;
            --primary-dark: #005e46;
            --bg-color: #f1f5f9;
            --text-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            width: 500px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .auth-card h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-color);
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 128, 96, 0.1);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-dark);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .error-box {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #fee2e2;
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Quên mật khẩu</h2>

        {% if messages %}
            {% for message in messages %}
            <div class="error-box">
                <i class="fa-solid fa-circle-exclamation"></i>
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nhập mật khẩu mới</label>
                <div class="input-wrapper">
                    <input type="password" name="new_password" placeholder="Nhập mật khẩu mới..." required autofocus pattern="^\S+$" title="Mật khẩu không được chứa dấu cách">
                </div>
            </div>
            
            <div class="form-group">
                <label>Nhập lại mật khẩu mới</label>
                <div class="input-wrapper">
                    <input type="password" name="confirm_password" placeholder="Nhập lại mật khẩu mới..." required pattern="^\S+$" title="Mật khẩu không được chứa dấu cách">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Xác nhận
            </button>
        </form>

        <a href="{% url 'login' %}" class="back-link">
            &larr; Quay về đăng nhập
        </a>
    </div>

</body>
</html>
